spring:
  application:
    name: erp-system
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/erp.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Shanghai}
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    root: INFO
    com.yhj.erp: DEBUG

# 默认用户配置
app:
  default:
    username: ${APP_DEFAULT_USERNAME:admin}
    password: ${APP_DEFAULT_PASSWORD:123456}
  timezone: ${APP_TIMEZONE:Asia/Shanghai}
  audit:
    enabled: ${APP_AUDIT_ENABLED:true}
    log-level: ${APP_AUDIT_LOG_LEVEL:INFO}