spring:
  application:
    name: network-service-test
  datasource:
    url: jdbc:sqlite:file::memory:?cache=shared
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: false

server:
  port: 0

logging:
  level:
    com.yhj.erp: DEBUG
    org.springframework: INFO